openapi: 3.0.0
info:
  title: AgriConnect Mada API
  description: API for agricultural product reservations in Madagascar
  version: 1.0.0
  contact:
    name: AgriConnect Mada
    email: support@agriconnect.mg

servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        first_name:
          type: string
          maxLength: 100
          example: Jean
        last_name:
          type: string
          maxLength: 100
          example: Rakoto
        email:
          type: string
          format: email
          maxLength: 150
          example: jean@example.com
        phone:
          type: string
          maxLength: 20
          example: +261321234567
        password_hash:
          type: string
          writeOnly: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required:
        - first_name
        - email
        - phone
        - password
      properties:
        first_name:
          type: string
          maxLength: 100
          example: Jean
        last_name:
          type: string
          maxLength: 100
          example: Rakoto
        email:
          type: string
          format: email
          maxLength: 150
          example: jean@example.com
        phone:
          type: string
          maxLength: 20
          example: +261321234567
        password:
          type: string
          minLength: 6
          example: securepassword123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: jean@example.com
        password:
          type: string
          example: securepassword123

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIs...
        user:
          $ref: '#/components/schemas/User'

    Product:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          maxLength: 120
          example: Riz blanc
        description:
          type: string
          example: Riz de première qualité
        quantity:
          type: number
          format: float
          example: 100.50
        price:
          type: number
          format: float
          example: 2500.00

    CreateProductRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 120
          example: Riz blanc
        description:
          type: string
          example: Riz de première qualité
        quantity:
          type: number
          format: float
          minimum: 0
          example: 100.50
        price:
          type: number
          format: float
          minimum: 0
          example: 2500.00

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 120
          example: Riz blanc
        description:
          type: string
          example: Riz de première qualité
        quantity:
          type: number
          format: float
          minimum: 0
          example: 100.50
        price:
          type: number
          format: float
          minimum: 0
          example: 2500.00

    Reservation:
      type: object
      properties:
        id:
          type: integer
          example: 1
        buyer_id:
          type: integer
          example: 1
        farmer_id:
          type: integer
          example: 2
        product_id:
          type: integer
          example: 1
        quantity:
          type: number
          format: float
          minimum: 0
          example: 50.00
        reservation_date:
          type: string
          format: date-time
          example: 2026-04-27T10:00:00Z
        status:
          type: string
          enum: [pending, confirmed]
          example: pending
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateReservationRequest:
      type: object
      required:
        - farmer_id
        - product_id
        - quantity
      properties:
        farmer_id:
          type: integer
          example: 2
        product_id:
          type: integer
          example: 1
        quantity:
          type: number
          format: float
          minimum: 0.01
          example: 50.00

    UpdateReservationRequest:
      type: object
      properties:
        quantity:
          type: number
          format: float
          minimum: 0.01
          example: 60.00
        status:
          type: string
          enum: [pending, confirmed]

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Invalid request"
        message:
          type: string
          example: "Email already exists"

security:
  - bearerAuth: []

paths:
  # Authentication
  /auth/register:
    post:
      summary: Register a new user
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        409:
          description: Email or phone already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      summary: Login user
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # Users
  /users:
    get:
      summary: Get all users
      tags: [Users]
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        401:
          description: Unauthorized

  /users/{id}:
    get:
      summary: Get user by ID
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: User ID
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Update user
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                phone:
                  type: string
      responses:
        200:
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        404:
          description: User not found

    delete:
      summary: Delete user
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: User deleted
        404:
          description: User not found

  # Products
  /products:
    get:
      summary: Get all products
      tags: [Products]
      security: []
      responses:
        200:
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      summary: Create a new product
      tags: [Products]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        201:
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        400:
          description: Invalid input

  /products/{id}:
    get:
      summary: Get product by ID
      tags: [Products]
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Product found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        404:
          description: Product not found

    put:
      summary: Update product
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        200:
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        404:
          description: Product not found

    delete:
      summary: Delete product
      tags: [Products]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Product deleted
        404:
          description: Product not found

  # Reservations
  /reservations:
    get:
      summary: Get all reservations
      tags: [Reservations]
      responses:
        200:
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'

    post:
      summary: Create a new reservation
      tags: [Reservations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        201:
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        400:
          description: Invalid input
        404:
          description: Product or farmer not found

  /reservations/{id}:
    get:
      summary: Get reservation by ID
      tags: [Reservations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Reservation found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        404:
          description: Reservation not found

    put:
      summary: Update reservation
      tags: [Reservations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateReservationRequest'
      responses:
        200:
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        404:
          description: Reservation not found

    delete:
      summary: Delete reservation
      tags: [Reservations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        204:
          description: Reservation deleted
        404:
          description: Reservation not found

  # Filter reservations by buyer
  /reservations/buyer/{buyerId}:
    get:
      summary: Get reservations by buyer ID
      tags: [Reservations]
      parameters:
        - name: buyerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: List of reservations for the buyer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        404:
          description: Buyer not found

  # Filter reservations by farmer
  /reservations/farmer/{farmerId}:
    get:
      summary: Get reservations by farmer ID
      tags: [Reservations]
      parameters:
        - name: farmerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        200:
          description: List of reservations for the farmer
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        404:
          description: Farmer not found

  # Filter reservations by status
  /reservations/status/{status}:
    get:
      summary: Get reservations by status
      tags: [Reservations]
      parameters:
        - name: status
          in: path
          required: true
          schema:
            type: string
            enum: [pending, confirmed]
      responses:
        200:
          description: List of reservations with the specified status
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'